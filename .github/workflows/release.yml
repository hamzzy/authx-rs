name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Publish to Crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish authx-core
        run: cargo publish -p authx-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

      - name: Wait for index
        run: sleep 30

      - name: Publish authx-storage
        run: cargo publish -p authx-storage
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

      - name: Wait for index
        run: sleep 30

      - name: Publish authx-plugins
        run: cargo publish -p authx-plugins
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

      - name: Wait for index
        run: sleep 30

      - name: Publish authx-axum
        run: cargo publish -p authx-axum
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

      - name: Wait for index
        run: sleep 30

      - name: Publish authx-cli
        run: cargo publish -p authx-cli
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

      - name: Wait for index
        run: sleep 30

      - name: Publish authx-dashboard
        run: cargo publish -p authx-dashboard
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
