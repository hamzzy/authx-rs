name: Release

# Triggered by: git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-*"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  js-sdk:
    name: TypeScript SDK (release gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Test @authx/sdk
        working-directory: packages/authx-sdk-ts
        run: |
          npm ci
          npm test
          npm run pack:check

      - name: Test @authx/sdk-web
        working-directory: packages/authx-sdk-web
        run: |
          npm ci
          npm test
          npm run pack:check

      - name: Test @authx/sdk-react
        working-directory: packages/authx-sdk-react
        run: |
          npm ci
          npm test
          npm run pack:check

      - name: Test @authx/sdk-vue
        working-directory: packages/authx-sdk-vue
        run: |
          npm ci
          npm test
          npm run pack:check

      - name: Verify generated TypeScript API docs
        run: |
          node scripts/generate-ts-api-docs.mjs
          git diff --exit-code -- docs/src/content/docs/reference/typescript

      - name: Build docs site
        working-directory: docs
        run: |
          npm ci
          npm run build

  test:
    name: Test (release gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  audit:
    name: Audit (release gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # RUSTSEC-2023-0071: rsa via sqlx-macros-core → sqlx-mysql (unconditional in sqlx 0.8)
          # We do not use MySQL; no runtime RSA code path exists.
          ignore: RUSTSEC-2023-0071

  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: [test, audit, js-sdk]
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # crates_io_has NAME VERSION
      # Queries the crates.io JSON API — anchored to the exact crate name and version.
      # Returns 0 (true) if the version is already indexed, 1 (false) otherwise.
      # This avoids false positives from `cargo info` which shows local workspace versions
      # and includes dependency version strings that match the grep pattern.
      #
      # Publish order: authx-core → authx-storage → authx-plugins → authx-axum → authx-dashboard → authx-cli
      # Each step is idempotent: safe to re-run after a partial failure.
      # After a new publish, sleeps 10 min for the crates.io new-crate rate-limit window,
      # then polls until the version appears in the API (max 6 min).

      - name: Publish authx-core
        run: |
          NAME=authx-core
          VERSION=$(cargo metadata --no-deps --format-version 1 | python3 -c "
          import json,sys
          pkgs=[p for p in json.load(sys.stdin)['packages'] if p['name']=='$NAME']
          print(pkgs[0]['version'])")
          crates_io_has() {
            local v
            v=$(curl -sf "https://crates.io/api/v1/crates/$NAME/$1" \
                  -H "User-Agent: authx-release/$1 (github-actions)" \
                | python3 -c "import json,sys; print(json.load(sys.stdin).get('version',{}).get('num',''))" 2>/dev/null)
            [ "$v" = "$1" ]
          }
          if crates_io_has "$VERSION"; then
            echo "$NAME $VERSION already on crates.io — skipping publish"
          else
            cargo publish -p "$NAME"
            echo "sleeping 10 min for crates.io new-crate rate-limit..."
            sleep 600
          fi
          for i in $(seq 1 18); do
            crates_io_has "$VERSION" && echo "$NAME $VERSION indexed" && exit 0
            echo "waiting for index... ($i/18)"; sleep 20
          done
          echo "timed out waiting for $NAME $VERSION" && exit 1

      - name: Publish authx-storage
        run: |
          NAME=authx-storage
          VERSION=$(cargo metadata --no-deps --format-version 1 | python3 -c "
          import json,sys
          pkgs=[p for p in json.load(sys.stdin)['packages'] if p['name']=='$NAME']
          print(pkgs[0]['version'])")
          crates_io_has() {
            local v
            v=$(curl -sf "https://crates.io/api/v1/crates/$NAME/$1" \
                  -H "User-Agent: authx-release/$1 (github-actions)" \
                | python3 -c "import json,sys; print(json.load(sys.stdin).get('version',{}).get('num',''))" 2>/dev/null)
            [ "$v" = "$1" ]
          }
          if crates_io_has "$VERSION"; then
            echo "$NAME $VERSION already on crates.io — skipping publish"
          else
            cargo publish -p "$NAME"
            echo "sleeping 10 min for crates.io new-crate rate-limit..."
            sleep 600
          fi
          for i in $(seq 1 18); do
            crates_io_has "$VERSION" && echo "$NAME $VERSION indexed" && exit 0
            echo "waiting for index... ($i/18)"; sleep 20
          done
          echo "timed out waiting for $NAME $VERSION" && exit 1

      - name: Publish authx-plugins
        run: |
          NAME=authx-plugins
          VERSION=$(cargo metadata --no-deps --format-version 1 | python3 -c "
          import json,sys
          pkgs=[p for p in json.load(sys.stdin)['packages'] if p['name']=='$NAME']
          print(pkgs[0]['version'])")
          crates_io_has() {
            local v
            v=$(curl -sf "https://crates.io/api/v1/crates/$NAME/$1" \
                  -H "User-Agent: authx-release/$1 (github-actions)" \
                | python3 -c "import json,sys; print(json.load(sys.stdin).get('version',{}).get('num',''))" 2>/dev/null)
            [ "$v" = "$1" ]
          }
          if crates_io_has "$VERSION"; then
            echo "$NAME $VERSION already on crates.io — skipping publish"
          else
            cargo publish -p "$NAME"
            echo "sleeping 10 min for crates.io new-crate rate-limit..."
            sleep 600
          fi
          for i in $(seq 1 18); do
            crates_io_has "$VERSION" && echo "$NAME $VERSION indexed" && exit 0
            echo "waiting for index... ($i/18)"; sleep 20
          done
          echo "timed out waiting for $NAME $VERSION" && exit 1

      - name: Publish authx-axum
        run: |
          NAME=authx-axum
          VERSION=$(cargo metadata --no-deps --format-version 1 | python3 -c "
          import json,sys
          pkgs=[p for p in json.load(sys.stdin)['packages'] if p['name']=='$NAME']
          print(pkgs[0]['version'])")
          crates_io_has() {
            local v
            v=$(curl -sf "https://crates.io/api/v1/crates/$NAME/$1" \
                  -H "User-Agent: authx-release/$1 (github-actions)" \
                | python3 -c "import json,sys; print(json.load(sys.stdin).get('version',{}).get('num',''))" 2>/dev/null)
            [ "$v" = "$1" ]
          }
          if crates_io_has "$VERSION"; then
            echo "$NAME $VERSION already on crates.io — skipping publish"
          else
            cargo publish -p "$NAME"
            echo "sleeping 10 min for crates.io new-crate rate-limit..."
            sleep 600
          fi
          for i in $(seq 1 18); do
            crates_io_has "$VERSION" && echo "$NAME $VERSION indexed" && exit 0
            echo "waiting for index... ($i/18)"; sleep 20
          done
          echo "timed out waiting for $NAME $VERSION" && exit 1

      - name: Publish authx-dashboard
        run: |
          NAME=authx-dashboard
          VERSION=$(cargo metadata --no-deps --format-version 1 | python3 -c "
          import json,sys
          pkgs=[p for p in json.load(sys.stdin)['packages'] if p['name']=='$NAME']
          print(pkgs[0]['version'])")
          crates_io_has() {
            local v
            v=$(curl -sf "https://crates.io/api/v1/crates/$NAME/$1" \
                  -H "User-Agent: authx-release/$1 (github-actions)" \
                | python3 -c "import json,sys; print(json.load(sys.stdin).get('version',{}).get('num',''))" 2>/dev/null)
            [ "$v" = "$1" ]
          }
          if crates_io_has "$VERSION"; then
            echo "$NAME $VERSION already on crates.io — skipping publish"
          else
            cargo publish -p "$NAME"
            echo "sleeping 10 min for crates.io new-crate rate-limit..."
            sleep 600
          fi
          for i in $(seq 1 18); do
            crates_io_has "$VERSION" && echo "$NAME $VERSION indexed" && exit 0
            echo "waiting for index... ($i/18)"; sleep 20
          done
          echo "timed out waiting for $NAME $VERSION" && exit 1

      - name: Publish authx-cli
        run: |
          NAME=authx-cli
          VERSION=$(cargo metadata --no-deps --format-version 1 | python3 -c "
          import json,sys
          pkgs=[p for p in json.load(sys.stdin)['packages'] if p['name']=='$NAME']
          print(pkgs[0]['version'])")
          crates_io_has() {
            local v
            v=$(curl -sf "https://crates.io/api/v1/crates/$NAME/$1" \
                  -H "User-Agent: authx-release/$1 (github-actions)" \
                | python3 -c "import json,sys; print(json.load(sys.stdin).get('version',{}).get('num',''))" 2>/dev/null)
            [ "$v" = "$1" ]
          }
          if crates_io_has "$VERSION"; then
            echo "$NAME $VERSION already on crates.io — skipping publish"
          else
            cargo publish -p "$NAME"
            echo "sleeping 10 min for crates.io new-crate rate-limit..."
            sleep 600
          fi
          for i in $(seq 1 18); do
            crates_io_has "$VERSION" && echo "$NAME $VERSION indexed" && exit 0
            echo "waiting for index... ($i/18)"; sleep 20
          done
          echo "timed out waiting for $NAME $VERSION" && exit 1

  publish-npm:
    name: Publish npm packages
    runs-on: ubuntu-latest
    needs: [test, audit, js-sdk]
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        package_dir:
          - packages/authx-sdk-ts
          - packages/authx-sdk-web
          - packages/authx-sdk-react
          - packages/authx-sdk-vue
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Verify npm authentication
        run: |
          npm whoami

      - name: Publish package if needed
        working-directory: ${{ matrix.package_dir }}
        run: |
          set -euo pipefail
          NAME=$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).name")
          VERSION=$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version")
          npm ci
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "$NAME@$VERSION already published, skipping"
            exit 0
          fi
          PUBLISH_LOG=$(mktemp)
          if npm publish --provenance --access public >"$PUBLISH_LOG" 2>&1; then
            cat "$PUBLISH_LOG"
            exit 0
          fi

          cat "$PUBLISH_LOG"
          if grep -q "npm error code E404" "$PUBLISH_LOG"; then
            SCOPE=$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).name.split('/')[0]")
            echo "::error::npm rejected publish for $NAME. This usually means the $SCOPE scope does not exist on npm, or the NPM_TOKEN is not allowed to publish under that scope."
            echo "::error::Verify the npm scope owner, org membership, token type, and that the GitHub Actions secret contains a publish-capable token."
          fi
          exit 1

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [publish, publish-npm]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: softprops/action-gh-release@v2.2.2
        with:
          name: "authx-rs ${{ github.ref_name }}"
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
