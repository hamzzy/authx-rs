name: Release

# Triggered by: git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test (release gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  audit:
    name: Audit (release gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # RUSTSEC-2023-0071: rsa via sqlx-macros-core → sqlx-mysql (unconditional in sqlx 0.8)
          # We do not use MySQL; no runtime RSA code path exists.
          ignore: RUSTSEC-2023-0071

  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: [test, audit]
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # publish_crate NAME VERSION
      # - Skips publish if the version is already on crates.io (idempotent).
      # - After a new publish, sleeps 10 min for the new-crate rate-limit window,
      #   then polls the sparse index until the version appears (max 6 min extra).
      # Safe to re-run after a partial failure without manual cleanup.

      - name: Publish authx-core
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 | python3 -c "
          import json,sys
          pkgs=[p for p in json.load(sys.stdin)['packages'] if p['name']=='authx-core']
          print(pkgs[0]['version'])")
          if cargo info authx-core 2>/dev/null | grep -q "$VERSION"; then
            echo "authx-core $VERSION already published — skipping"
          else
            cargo publish -p authx-core
            echo "sleeping 10 min for crates.io new-crate rate-limit..."
            sleep 600
          fi
          for i in $(seq 1 18); do
            cargo info authx-core 2>/dev/null | grep -q "$VERSION" && echo "authx-core $VERSION indexed" && exit 0
            echo "waiting for index... ($i/18)"; sleep 20
          done
          echo "timed out waiting for authx-core" && exit 1

      - name: Publish authx-storage
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 | python3 -c "
          import json,sys
          pkgs=[p for p in json.load(sys.stdin)['packages'] if p['name']=='authx-storage']
          print(pkgs[0]['version'])")
          if cargo info authx-storage 2>/dev/null | grep -q "$VERSION"; then
            echo "authx-storage $VERSION already published — skipping"
          else
            cargo publish -p authx-storage
            echo "sleeping 10 min for crates.io new-crate rate-limit..."
            sleep 600
          fi
          for i in $(seq 1 18); do
            cargo info authx-storage 2>/dev/null | grep -q "$VERSION" && echo "authx-storage $VERSION indexed" && exit 0
            echo "waiting for index... ($i/18)"; sleep 20
          done
          echo "timed out waiting for authx-storage" && exit 1

      - name: Publish authx-plugins
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 | python3 -c "
          import json,sys
          pkgs=[p for p in json.load(sys.stdin)['packages'] if p['name']=='authx-plugins']
          print(pkgs[0]['version'])")
          if cargo info authx-plugins 2>/dev/null | grep -q "$VERSION"; then
            echo "authx-plugins $VERSION already published — skipping"
          else
            cargo publish -p authx-plugins
            echo "sleeping 10 min for crates.io new-crate rate-limit..."
            sleep 600
          fi
          for i in $(seq 1 18); do
            cargo info authx-plugins 2>/dev/null | grep -q "$VERSION" && echo "authx-plugins $VERSION indexed" && exit 0
            echo "waiting for index... ($i/18)"; sleep 20
          done
          echo "timed out waiting for authx-plugins" && exit 1

      - name: Publish authx-axum
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 | python3 -c "
          import json,sys
          pkgs=[p for p in json.load(sys.stdin)['packages'] if p['name']=='authx-axum']
          print(pkgs[0]['version'])")
          if cargo info authx-axum 2>/dev/null | grep -q "$VERSION"; then
            echo "authx-axum $VERSION already published — skipping"
          else
            cargo publish -p authx-axum
            echo "sleeping 10 min for crates.io new-crate rate-limit..."
            sleep 600
          fi
          for i in $(seq 1 18); do
            cargo info authx-axum 2>/dev/null | grep -q "$VERSION" && echo "authx-axum $VERSION indexed" && exit 0
            echo "waiting for index... ($i/18)"; sleep 20
          done
          echo "timed out waiting for authx-axum" && exit 1

      - name: Publish authx-dashboard
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 | python3 -c "
          import json,sys
          pkgs=[p for p in json.load(sys.stdin)['packages'] if p['name']=='authx-dashboard']
          print(pkgs[0]['version'])")
          if cargo info authx-dashboard 2>/dev/null | grep -q "$VERSION"; then
            echo "authx-dashboard $VERSION already published — skipping"
          else
            cargo publish -p authx-dashboard
            echo "sleeping 10 min for crates.io new-crate rate-limit..."
            sleep 600
          fi
          for i in $(seq 1 18); do
            cargo info authx-dashboard 2>/dev/null | grep -q "$VERSION" && echo "authx-dashboard $VERSION indexed" && exit 0
            echo "waiting for index... ($i/18)"; sleep 20
          done
          echo "timed out waiting for authx-dashboard" && exit 1

      - name: Publish authx-cli
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 | python3 -c "
          import json,sys
          pkgs=[p for p in json.load(sys.stdin)['packages'] if p['name']=='authx-cli']
          print(pkgs[0]['version'])")
          if cargo info authx-cli 2>/dev/null | grep -q "$VERSION"; then
            echo "authx-cli $VERSION already published — skipping"
          else
            cargo publish -p authx-cli
          fi

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog section
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          NOTES=$(awk "/^## \[$VERSION\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md)
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@v2.2.2
        with:
          name: "authx-rs v${{ steps.version.outputs.version }}"
          body: "${{ steps.changelog.outputs.notes }}"
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
