name: Release

# Triggered by: git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test (release gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  audit:
    name: Audit (release gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # RUSTSEC-2023-0071: rsa via sqlx-macros-core → sqlx-mysql (unconditional in sqlx 0.8)
          # We do not use MySQL; no runtime RSA code path exists.
          ignore: RUSTSEC-2023-0071

  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: [test, audit]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Publish authx-core
        run: cargo publish -p authx-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

      - name: Wait for authx-core index
        run: |
          for i in $(seq 1 18); do
            if cargo info authx-core 2>/dev/null | grep -q "0\.1\.0"; then
              echo "authx-core indexed"
              exit 0
            fi
            echo "waiting... ($i/18)"
            sleep 20
          done
          echo "timed out waiting for authx-core" && exit 1

      - name: Publish authx-storage
        run: cargo publish -p authx-storage
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

      - name: Wait for authx-storage index
        run: |
          for i in $(seq 1 18); do
            if cargo info authx-storage 2>/dev/null | grep -q "0\.1\.0"; then
              echo "authx-storage indexed"
              exit 0
            fi
            echo "waiting... ($i/18)"
            sleep 20
          done
          echo "timed out waiting for authx-storage" && exit 1

      - name: Publish authx-plugins
        run: cargo publish -p authx-plugins
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

      - name: Wait for authx-plugins index
        run: |
          for i in $(seq 1 18); do
            if cargo info authx-plugins 2>/dev/null | grep -q "0\.1\.0"; then
              echo "authx-plugins indexed"
              exit 0
            fi
            echo "waiting... ($i/18)"
            sleep 20
          done
          echo "timed out waiting for authx-plugins" && exit 1

      - name: Publish authx-axum
        run: cargo publish -p authx-axum
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

      - name: Wait for authx-axum index
        run: |
          for i in $(seq 1 18); do
            if cargo info authx-axum 2>/dev/null | grep -q "0\.1\.0"; then
              echo "authx-axum indexed"
              exit 0
            fi
            echo "waiting... ($i/18)"
            sleep 20
          done
          echo "timed out waiting for authx-axum" && exit 1

      - name: Publish authx-dashboard
        run: cargo publish -p authx-dashboard
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

      - name: Wait for authx-dashboard index
        run: |
          for i in $(seq 1 18); do
            if cargo info authx-dashboard 2>/dev/null | grep -q "0\.1\.0"; then
              echo "authx-dashboard indexed"
              exit 0
            fi
            echo "waiting... ($i/18)"
            sleep 20
          done
          echo "timed out waiting for authx-dashboard" && exit 1

      - name: Publish authx-cli
        run: cargo publish -p authx-cli
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog section
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          NOTES=$(awk "/^## \[$VERSION\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md)
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@v2.2.2
        with:
          name: "authx-rs v${{ steps.version.outputs.version }}"
          body: "${{ steps.changelog.outputs.notes }}"
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
