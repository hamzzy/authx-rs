name: Release

# Triggered by: git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test (release gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  audit:
    name: Audit (release gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # RUSTSEC-2023-0071: rsa via sqlx-macros-core → sqlx-mysql (unconditional in sqlx 0.8)
          # We do not use MySQL; no runtime RSA code path exists.
          ignore: RUSTSEC-2023-0071

  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: [test, audit]
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # crates_io_has NAME VERSION
      # Queries the crates.io JSON API — anchored to the exact crate name and version.
      # Returns 0 (true) if the version is already indexed, 1 (false) otherwise.
      # This avoids false positives from `cargo info` which shows local workspace versions
      # and includes dependency version strings that match the grep pattern.
      #
      # Publish order: authx-core → authx-storage → authx-plugins → authx-axum → authx-dashboard → authx-cli
      # Each step is idempotent: safe to re-run after a partial failure.
      # After a new publish, sleeps 10 min for the crates.io new-crate rate-limit window,
      # then polls until the version appears in the API (max 6 min).

      - name: Publish authx-core
        run: |
          NAME=authx-core
          VERSION=$(cargo metadata --no-deps --format-version 1 | python3 -c "
          import json,sys
          pkgs=[p for p in json.load(sys.stdin)['packages'] if p['name']=='$NAME']
          print(pkgs[0]['version'])")
          crates_io_has() {
            local v
            v=$(curl -sf "https://crates.io/api/v1/crates/$NAME/$1" \
                  -H "User-Agent: authx-release/$1 (github-actions)" \
                | python3 -c "import json,sys; print(json.load(sys.stdin).get('version',{}).get('num',''))" 2>/dev/null)
            [ "$v" = "$1" ]
          }
          if crates_io_has "$VERSION"; then
            echo "$NAME $VERSION already on crates.io — skipping publish"
          else
            cargo publish -p "$NAME"
            echo "sleeping 10 min for crates.io new-crate rate-limit..."
            sleep 600
          fi
          for i in $(seq 1 18); do
            crates_io_has "$VERSION" && echo "$NAME $VERSION indexed" && exit 0
            echo "waiting for index... ($i/18)"; sleep 20
          done
          echo "timed out waiting for $NAME $VERSION" && exit 1

      - name: Publish authx-storage
        run: |
          NAME=authx-storage
          VERSION=$(cargo metadata --no-deps --format-version 1 | python3 -c "
          import json,sys
          pkgs=[p for p in json.load(sys.stdin)['packages'] if p['name']=='$NAME']
          print(pkgs[0]['version'])")
          crates_io_has() {
            local v
            v=$(curl -sf "https://crates.io/api/v1/crates/$NAME/$1" \
                  -H "User-Agent: authx-release/$1 (github-actions)" \
                | python3 -c "import json,sys; print(json.load(sys.stdin).get('version',{}).get('num',''))" 2>/dev/null)
            [ "$v" = "$1" ]
          }
          if crates_io_has "$VERSION"; then
            echo "$NAME $VERSION already on crates.io — skipping publish"
          else
            cargo publish -p "$NAME"
            echo "sleeping 10 min for crates.io new-crate rate-limit..."
            sleep 600
          fi
          for i in $(seq 1 18); do
            crates_io_has "$VERSION" && echo "$NAME $VERSION indexed" && exit 0
            echo "waiting for index... ($i/18)"; sleep 20
          done
          echo "timed out waiting for $NAME $VERSION" && exit 1

      - name: Publish authx-plugins
        run: |
          NAME=authx-plugins
          VERSION=$(cargo metadata --no-deps --format-version 1 | python3 -c "
          import json,sys
          pkgs=[p for p in json.load(sys.stdin)['packages'] if p['name']=='$NAME']
          print(pkgs[0]['version'])")
          crates_io_has() {
            local v
            v=$(curl -sf "https://crates.io/api/v1/crates/$NAME/$1" \
                  -H "User-Agent: authx-release/$1 (github-actions)" \
                | python3 -c "import json,sys; print(json.load(sys.stdin).get('version',{}).get('num',''))" 2>/dev/null)
            [ "$v" = "$1" ]
          }
          if crates_io_has "$VERSION"; then
            echo "$NAME $VERSION already on crates.io — skipping publish"
          else
            cargo publish -p "$NAME"
            echo "sleeping 10 min for crates.io new-crate rate-limit..."
            sleep 600
          fi
          for i in $(seq 1 18); do
            crates_io_has "$VERSION" && echo "$NAME $VERSION indexed" && exit 0
            echo "waiting for index... ($i/18)"; sleep 20
          done
          echo "timed out waiting for $NAME $VERSION" && exit 1

      - name: Publish authx-axum
        run: |
          NAME=authx-axum
          VERSION=$(cargo metadata --no-deps --format-version 1 | python3 -c "
          import json,sys
          pkgs=[p for p in json.load(sys.stdin)['packages'] if p['name']=='$NAME']
          print(pkgs[0]['version'])")
          crates_io_has() {
            local v
            v=$(curl -sf "https://crates.io/api/v1/crates/$NAME/$1" \
                  -H "User-Agent: authx-release/$1 (github-actions)" \
                | python3 -c "import json,sys; print(json.load(sys.stdin).get('version',{}).get('num',''))" 2>/dev/null)
            [ "$v" = "$1" ]
          }
          if crates_io_has "$VERSION"; then
            echo "$NAME $VERSION already on crates.io — skipping publish"
          else
            cargo publish -p "$NAME"
            echo "sleeping 10 min for crates.io new-crate rate-limit..."
            sleep 600
          fi
          for i in $(seq 1 18); do
            crates_io_has "$VERSION" && echo "$NAME $VERSION indexed" && exit 0
            echo "waiting for index... ($i/18)"; sleep 20
          done
          echo "timed out waiting for $NAME $VERSION" && exit 1

      - name: Publish authx-dashboard
        run: |
          NAME=authx-dashboard
          VERSION=$(cargo metadata --no-deps --format-version 1 | python3 -c "
          import json,sys
          pkgs=[p for p in json.load(sys.stdin)['packages'] if p['name']=='$NAME']
          print(pkgs[0]['version'])")
          crates_io_has() {
            local v
            v=$(curl -sf "https://crates.io/api/v1/crates/$NAME/$1" \
                  -H "User-Agent: authx-release/$1 (github-actions)" \
                | python3 -c "import json,sys; print(json.load(sys.stdin).get('version',{}).get('num',''))" 2>/dev/null)
            [ "$v" = "$1" ]
          }
          if crates_io_has "$VERSION"; then
            echo "$NAME $VERSION already on crates.io — skipping publish"
          else
            cargo publish -p "$NAME"
            echo "sleeping 10 min for crates.io new-crate rate-limit..."
            sleep 600
          fi
          for i in $(seq 1 18); do
            crates_io_has "$VERSION" && echo "$NAME $VERSION indexed" && exit 0
            echo "waiting for index... ($i/18)"; sleep 20
          done
          echo "timed out waiting for $NAME $VERSION" && exit 1

      - name: Publish authx-cli
        run: |
          NAME=authx-cli
          VERSION=$(cargo metadata --no-deps --format-version 1 | python3 -c "
          import json,sys
          pkgs=[p for p in json.load(sys.stdin)['packages'] if p['name']=='$NAME']
          print(pkgs[0]['version'])")
          crates_io_has() {
            local v
            v=$(curl -sf "https://crates.io/api/v1/crates/$NAME/$1" \
                  -H "User-Agent: authx-release/$1 (github-actions)" \
                | python3 -c "import json,sys; print(json.load(sys.stdin).get('version',{}).get('num',''))" 2>/dev/null)
            [ "$v" = "$1" ]
          }
          if crates_io_has "$VERSION"; then
            echo "$NAME $VERSION already on crates.io — skipping publish"
          else
            cargo publish -p "$NAME"
            echo "sleeping 10 min for crates.io new-crate rate-limit..."
            sleep 600
          fi
          for i in $(seq 1 18); do
            crates_io_has "$VERSION" && echo "$NAME $VERSION indexed" && exit 0
            echo "waiting for index... ($i/18)"; sleep 20
          done
          echo "timed out waiting for $NAME $VERSION" && exit 1

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog section
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          NOTES=$(awk "/^## \[$VERSION\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md)
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@v2.2.2
        with:
          name: "authx-rs v${{ steps.version.outputs.version }}"
          body: "${{ steps.changelog.outputs.notes }}"
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
