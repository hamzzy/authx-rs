name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  ts-sdk:
    name: TypeScript SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Test @authx/sdk
        working-directory: packages/authx-sdk-ts
        run: |
          npm ci
          npm test
          npm run pack:check

      - name: Test @authx/sdk-web
        working-directory: packages/authx-sdk-web
        run: |
          npm ci
          npm test
          npm run pack:check

      - name: Test @authx/sdk-react
        working-directory: packages/authx-sdk-react
        run: |
          npm ci
          npm test
          npm run pack:check

      - name: Test @authx/sdk-vue
        working-directory: packages/authx-sdk-vue
        run: |
          npm ci
          npm test
          npm run pack:check

      - name: Verify generated TypeScript API docs
        run: |
          node scripts/generate-ts-api-docs.mjs
          git diff --exit-code -- docs/src/content/docs/reference/typescript

      - name: Build docs site
        working-directory: docs
        run: |
          npm install
          npm run build

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Run audit
        # RUSTSEC-2023-0071: rsa via sqlx-macros-core → sqlx-mysql (unconditional in sqlx 0.8).
        # We do not use MySQL; no runtime RSA code path exists. No fix available upstream.
        # https://github.com/launchbadge/sqlx/issues/3397
        run: cargo audit --ignore RUSTSEC-2023-0071
