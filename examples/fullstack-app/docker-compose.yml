services:
  postgres:
    image: postgres:17-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: authx
      POSTGRES_PASSWORD: authx
      POSTGRES_DB: authx
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authx"]
      interval: 3s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
